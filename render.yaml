services:
  - type: web
    name: mini-netflix-api
    env: node
    region: oregon
    plan: free
    buildCommand: npm install
    startCommand: node server/index.js
    envVars:
      - key: PORT
        value: 4000
      - key: JWT_SECRET
        value: mini-netflix-secret
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: mini-netflix-db
          property: connectionString

databases:
  - name: mini-netflix-db
    databaseName: mini_netflix
    user: mini_netflix
    plan: free
